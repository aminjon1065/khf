name: security

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos
  schedule:
    # Weekly re-scan so newly-disclosed advisories against pinned versions are surfaced.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      # Fails the build on any known advisory against the locked PHP dependencies.
      - name: Composer Audit
        run: composer audit --locked

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: npm

      - name: Install Node Dependencies
        run: npm ci

      # Blocking: production dependencies must carry no known advisories.
      # concurrently (which pins the vulnerable shell-quote, GHSA-w7jw-789q-3m8p) is a dev-only
      # tool and lives in devDependencies, so --omit=dev keeps it out of this gate.
      - name: NPM Audit (production dependencies)
        run: npm audit --omit=dev
