name: security

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos
  schedule:
    # Weekly re-scan so newly-disclosed advisories against pinned versions are surfaced.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      # Fails the build on any known advisory against the locked PHP dependencies.
      - name: Composer Audit
        run: composer audit --locked

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'
          cache: npm

      - name: Install Node Dependencies
        run: npm ci

      # Blocking: production dependencies must carry no known advisories.
      # concurrently (which pins the vulnerable shell-quote, GHSA-w7jw-789q-3m8p) is a dev-only
      # tool and lives in devDependencies, so --omit=dev keeps it out of this gate.
      - name: NPM Audit (production dependencies)
        run: npm audit --omit=dev
