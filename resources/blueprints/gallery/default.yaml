title: Галерея
sections:
  main:
    display: Содержание
    fields:
      - handle: title
        type: text
        display: Название
        localizable: true
        required: true
      - handle: slug
        type: slug
        display: ЧПУ (slug)
        localizable: true
      - handle: description
        type: textarea
        display: Описание
        localizable: true
        rows: 3
        max: 1000
      - handle: photos
        type: assets
        display: Фотографии
        instructions: JPG, PNG, GIF, WebP — до 5 МБ каждое
  sidebar:
    display: Публикация
    fields:
      - handle: status
        type: status
        display: Статус
      - handle: sort_order
        type: number
        display: Порядок
