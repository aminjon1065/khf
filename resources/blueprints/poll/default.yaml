title: Опрос
sections:
    main:
        display: Содержание
        fields:
            - handle: title
              type: text
              display: Заголовок
              localizable: true
              required: true
            - handle: slug
              type: slug
              display: ЧПУ (slug)
              localizable: true
            - handle: description
              type: textarea
              display: Описание
              localizable: true
            - handle: options
              type: replicator
              display: Варианты ответа
              min: 2
              max: 20
              fields:
                  - handle: label
                    type: text
                    display: Текст варианта
                    localizable: true
                    required: true
                  - handle: sort_order
                    type: number
                    display: Порядок
    sidebar:
        display: Публикация
        fields:
            - handle: status
              type: status
              display: Статус
            - handle: type
              type: select
              display: Тип опроса
              required: true
            - handle: starts_at
              type: date
              display: Начало
            - handle: ends_at
              type: date
              display: Окончание
            - handle: show_results
              type: toggle
              display: Показывать результаты
              default: true
            - handle: sort_order
              type: number
              display: Порядок
